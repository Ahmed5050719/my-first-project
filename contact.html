<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تواصل معنا - موقع ألعاب الأطفال</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- الهيدر -->
    <header>
        <h1>📬 تواصل معنا</h1>
        <nav>
            <a href="index.html">الرئيسية</a>
            <a href="games.html">الألعاب</a>
            <a href="favorites.html">المفضلة</a>
            <a href="contact.html">تواصل معنا</a>
            <a href="about.html">من نحن</a>
        </nav>
    </header>

    <!-- نموذج التواصل -->
    <section class="contact-form-section">
        <form id="contactForm">
            <label for="name">الاسم:</label>
            <input type="text" id="name" placeholder="أدخل اسمك">

            <label for="email">البريد الإلكتروني:</label>
            <input type="email" id="email" placeholder="أدخل بريدك الإلكتروني">

            <label for="message">الرسالة:</label>
            <textarea id="message" placeholder="اكتب رسالتك هنا"></textarea>

            <button type="submit">إرسال الرسالة</button>
        </form>
        <p id="formMessage" class="form-message"></p>
    </section>

    <!-- الفوتر -->
    <footer>
        <p>© 2026 جميع الحقوق محفوظة لموقع ألعاب الأطفال</p>
    </footer>

    <script src="js/contact.js"></script>
</body>
</html>
